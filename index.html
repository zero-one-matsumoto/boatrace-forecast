<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ボートレース展開予想 | Boatrace Forecast</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>🚤 ボートレース展開予想</h1>
      <p class="subtitle">出走表を入力すると、スタート〜1マークの<strong>展開</strong>を予測し可視化します</p>
    </div>
  </header>

  <noscript>
    <div class="noscript-warn">
      ⚠ このアプリは JavaScript が必要です。プレビュー表示ではなく、
      <strong>Safari や Chrome などのブラウザで直接開いて</strong>ください。
    </div>
  </noscript>

  <main class="layout">
    <!-- 入力パネル -->
    <section class="panel input-panel">
      <div class="panel-head">
        <h2>出走表</h2>
        <div class="panel-actions">
          <button id="sampleBtn" class="btn btn-ghost" type="button">サンプル読込</button>
          <button id="randomBtn" class="btn btn-ghost" type="button">ランダム生成</button>
        </div>
      </div>

      <div class="fetch-bar">
        <select id="stadiumSel" class="fetch-select" aria-label="競艇場">
          <option value="1">桐生</option><option value="2">戸田</option>
          <option value="3">江戸川</option><option value="4">平和島</option>
          <option value="5">多摩川</option><option value="6">浜名湖</option>
          <option value="7">蒲郡</option><option value="8">常滑</option>
          <option value="9">津</option><option value="10">三国</option>
          <option value="11">びわこ</option><option value="12">住之江</option>
          <option value="13">尼崎</option><option value="14">鳴門</option>
          <option value="15">丸亀</option><option value="16">児島</option>
          <option value="17">宮島</option><option value="18">徳山</option>
          <option value="19">下関</option><option value="20">若松</option>
          <option value="21">芦屋</option><option value="22">福岡</option>
          <option value="23">唐津</option><option value="24">大村</option>
        </select>
        <select id="raceSel" class="fetch-select" aria-label="レース番号">
          <option value="1">1R</option><option value="2">2R</option>
          <option value="3">3R</option><option value="4">4R</option>
          <option value="5">5R</option><option value="6">6R</option>
          <option value="7">7R</option><option value="8">8R</option>
          <option value="9">9R</option><option value="10">10R</option>
          <option value="11">11R</option><option value="12">12R</option>
        </select>
        <button id="fetchBtn" class="btn btn-fetch" type="button">公式データ取得</button>
      </div>
      <p id="fetchStatus" class="fetch-status"></p>

      <div class="table-wrap">
        <table id="entryTable" class="entry-table">
          <thead>
            <tr>
              <th>艇</th>
              <th>選手名</th>
              <th title="全国勝率">全国<br>勝率</th>
              <th title="モーター2連対率(%)">モーター<br>2連率</th>
              <th title="平均スタートタイミング">平均<br>ST</th>
            </tr>
          </thead>
          <tbody id="entryBody"><!-- JSで生成 --></tbody>
        </table>
      </div>

      <button id="predictBtn" class="btn btn-primary btn-block" type="button">展開を予想する</button>
      <p class="hint">※ 数値は実際の出走表（公式サイト等）を参考に入力してください。</p>
    </section>

    <!-- 可視化パネル -->
    <section class="panel viz-panel">
      <div class="panel-head">
        <h2>展開予想ビジュアライザー</h2>
        <div class="panel-actions">
          <span id="kimariteBadge" class="badge badge-hidden">決まり手: -</span>
          <button id="replayBtn" class="btn btn-ghost" type="button" disabled>▶ 再生</button>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="raceCanvas" width="920" height="520"></canvas>
        <div id="vizPlaceholder" class="viz-placeholder">
          <p>「展開を予想する」を押すと、ここに1マークの攻防が表示されます。</p>
        </div>
      </div>
      <p id="vizComment" class="viz-comment"></p>
    </section>

    <!-- 結果パネル -->
    <section class="panel result-panel">
      <div class="panel-head"><h2>予想結果</h2></div>
      <div id="resultEmpty" class="result-empty">予想を実行すると、着順予想と推奨買い目を表示します。</div>
      <div id="resultContent" class="result-content" hidden>
        <h3>着順予想（確率）</h3>
        <ol id="rankingList" class="ranking-list"></ol>
        <h3>推奨買い目</h3>
        <div id="betList" class="bet-list"></div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>本アプリの予想は統計的ヒューリスティクスに基づく参考情報です。舟券の購入は自己責任で行ってください。</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/visualize.js"></script>
  <script src="js/fetch.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
