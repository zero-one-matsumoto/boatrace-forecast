<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ボートレース展開予想 | Boatrace Forecast</title>
  <style>
:root {
  --bg: #0d1b2a;
  --bg-panel: #ffffff;
  --bg-soft: #f4f7fb;
  --ink: #1b263b;
  --ink-soft: #5b6b7a;
  --accent: #0077b6;
  --accent-dark: #023e8a;
  --water: #1d6fa5;
  --water-deep: #0b4d7a;
  --line: #d9e2ec;
  --shadow: 0 6px 24px rgba(2, 32, 64, 0.12);
  /* 艇番カラー（ボートレース標準） */
  --boat1: #ffffff;
  --boat2: #1a1a1a;
  --boat3: #e63946;
  --boat4: #2a6fdb;
  --boat5: #f4c20d;
  --boat6: #2a9d4a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui, sans-serif;
  color: var(--ink);
  background: linear-gradient(160deg, #eef3f8 0%, #dbe7f1 100%);
  min-height: 100vh;
}

/* ---- Header ---- */
.app-header {
  background: linear-gradient(120deg, var(--accent-dark), var(--accent));
  color: #fff;
  padding: 22px 16px;
  box-shadow: var(--shadow);
}
.header-inner { max-width: 1240px; margin: 0 auto; }
.app-header h1 { margin: 0 0 4px; font-size: 1.7rem; }
.subtitle { margin: 0; opacity: 0.92; font-size: 0.95rem; }
.subtitle strong { color: #ffd166; }

/* ---- Layout ---- */
.layout {
  max-width: 1240px;
  margin: 22px auto;
  padding: 0 16px;
  display: grid;
  grid-template-columns: 360px 1fr;
  grid-template-areas:
    "input viz"
    "result viz";
  gap: 18px;
  align-items: start;
}
.input-panel { grid-area: input; }
.viz-panel { grid-area: viz; }
.result-panel { grid-area: result; }

@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-areas: "input" "viz" "result";
  }
}

/* ---- Panels ---- */
.panel {
  background: var(--bg-panel);
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.panel-head h2 { margin: 0; font-size: 1.1rem; }
.panel-actions { display: flex; gap: 8px; align-items: center; }

/* ---- Buttons ---- */
.btn {
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.05s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-ghost { background: var(--bg-soft); color: var(--ink); border: 1px solid var(--line); }
.btn-ghost:hover { background: #e7eef6; }
.btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-block { width: 100%; margin-top: 12px; padding: 12px; font-size: 1rem; }

/* ---- Entry table ---- */
.table-wrap { overflow-x: auto; }
.entry-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.entry-table th, .entry-table td {
  border-bottom: 1px solid var(--line);
  padding: 6px 4px;
  text-align: center;
}
.entry-table thead th { color: var(--ink-soft); font-weight: 700; line-height: 1.2; }
.entry-table input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 6px;
  font-size: 0.88rem;
  text-align: center;
}
.entry-table input.name-input { text-align: left; }
.entry-table input:focus { outline: 2px solid var(--accent); border-color: transparent; }

.boat-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 50%;
  font-weight: 800;
  border: 2px solid rgba(0,0,0,0.2);
  font-size: 0.85rem;
}
.hint { font-size: 0.75rem; color: var(--ink-soft); margin: 10px 0 0; }

/* ---- Canvas / Viz ---- */
.canvas-wrap { position: relative; width: 100%; }
#raceCanvas {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
  background: var(--water);
}
.viz-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #eaf4fb; text-align: center; padding: 24px;
  background: rgba(11, 77, 122, 0.55);
  border-radius: 12px;
}
.viz-comment {
  margin: 12px 2px 0;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--ink);
  min-height: 1.2em;
}
.badge {
  background: #ffd166;
  color: #5a3e00;
  font-weight: 800;
  border-radius: 999px;
  padding: 5px 12px;
  font-size: 0.85rem;
}
.badge-hidden { opacity: 0; }

/* ---- Result ---- */
.result-empty { color: var(--ink-soft); font-size: 0.9rem; }
.result-content h3 { font-size: 0.95rem; margin: 4px 0 8px; color: var(--accent-dark); }
.ranking-list { list-style: none; counter-reset: rank; padding: 0; margin: 0 0 16px; }
.ranking-list li {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 6px; border-bottom: 1px solid var(--line);
}
.rank-pos {
  font-weight: 800; color: var(--accent-dark); width: 34px;
  font-size: 0.95rem;
}
.rank-name { flex: 1; font-size: 0.9rem; }
.prob-bar-wrap { flex: 1.4; background: var(--bg-soft); border-radius: 6px; overflow: hidden; height: 16px; }
.prob-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); }
.prob-val { width: 52px; text-align: right; font-size: 0.82rem; color: var(--ink-soft); }

.bet-list { display: flex; flex-direction: column; gap: 8px; }
.bet-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-soft); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px;
}
.bet-type { font-size: 0.78rem; color: var(--ink-soft); }
.bet-combo { font-weight: 800; font-size: 1rem; letter-spacing: 1px; }
.bet-conf { font-size: 0.8rem; color: var(--accent-dark); font-weight: 700; }

/* ---- Footer ---- */
.app-footer {
  text-align: center; color: var(--ink-soft);
  font-size: 0.78rem; padding: 16px; margin-top: 8px;
}

</style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>🚤 ボートレース展開予想</h1>
      <p class="subtitle">出走表を入力すると、スタート〜1マークの<strong>展開</strong>を予測し可視化します</p>
    </div>
  </header>

  <main class="layout">
    <!-- 入力パネル -->
    <section class="panel input-panel">
      <div class="panel-head">
        <h2>出走表</h2>
        <div class="panel-actions">
          <button id="sampleBtn" class="btn btn-ghost" type="button">サンプル読込</button>
          <button id="randomBtn" class="btn btn-ghost" type="button">ランダム生成</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="entryTable" class="entry-table">
          <thead>
            <tr>
              <th>艇</th>
              <th>選手名</th>
              <th title="全国勝率">全国<br>勝率</th>
              <th title="モーター2連対率(%)">モーター<br>2連率</th>
              <th title="平均スタートタイミング">平均<br>ST</th>
            </tr>
          </thead>
          <tbody id="entryBody"><!-- JSで生成 --></tbody>
        </table>
      </div>

      <button id="predictBtn" class="btn btn-primary btn-block" type="button">展開を予想する</button>
      <p class="hint">※ 数値は実際の出走表（公式サイト等）を参考に入力してください。</p>
    </section>

    <!-- 可視化パネル -->
    <section class="panel viz-panel">
      <div class="panel-head">
        <h2>展開予想ビジュアライザー</h2>
        <div class="panel-actions">
          <span id="kimariteBadge" class="badge badge-hidden">決まり手: -</span>
          <button id="replayBtn" class="btn btn-ghost" type="button" disabled>▶ 再生</button>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="raceCanvas" width="920" height="520"></canvas>
        <div id="vizPlaceholder" class="viz-placeholder">
          <p>「展開を予想する」を押すと、ここに1マークの攻防が表示されます。</p>
        </div>
      </div>
      <p id="vizComment" class="viz-comment"></p>
    </section>

    <!-- 結果パネル -->
    <section class="panel result-panel">
      <div class="panel-head"><h2>予想結果</h2></div>
      <div id="resultEmpty" class="result-empty">予想を実行すると、着順予想と推奨買い目を表示します。</div>
      <div id="resultContent" class="result-content" hidden>
        <h3>着順予想（確率）</h3>
        <ol id="rankingList" class="ranking-list"></ol>
        <h3>推奨買い目</h3>
        <div id="betList" class="bet-list"></div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>本アプリの予想は統計的ヒューリスティクスに基づく参考情報です。舟券の購入は自己責任で行ってください。</p>
  </footer>

  <script>
/**
 * data.js — 静的データと定数の定義
 * ボートレースのドメイン知識（艇番カラー・コース別成績・サンプル出走表）を保持する。
 */
const BR = window.BR || {};

/** 艇番ごとの標準カラーと表記 */
BR.BOATS = [
  { no: 1, color: "#ffffff", textColor: "#222", label: "白" },
  { no: 2, color: "#1a1a1a", textColor: "#fff", label: "黒" },
  { no: 3, color: "#e63946", textColor: "#fff", label: "赤" },
  { no: 4, color: "#2a6fdb", textColor: "#fff", label: "青" },
  { no: 5, color: "#f4c20d", textColor: "#222", label: "黄" },
  { no: 6, color: "#2a9d4a", textColor: "#fff", label: "緑" },
];

/**
 * コース（進入コース＝通常は艇番）別の全国平均 1着率。
 * インコースほど有利という競艇の基本特性を反映した近似値（%）。
 */
BR.COURSE_WIN_RATE = {
  1: 55,
  2: 14,
  3: 12,
  4: 11,
  5: 6,
  6: 2,
};

/** 決まり手の説明文 */
BR.KIMARITE_INFO = {
  "逃げ": "1号艇がインから先マイしてそのまま押し切る、最も基本的な展開。",
  "差し": "先行艇がターンで外へ流れた内側を、後続がすくって逆転する展開。",
  "まくり": "外側の艇がスピードに乗り、内の艇を一気に抜き去って先マイする展開。",
  "まくり差し": "まくって来た艇のさらに内を差す、近年増加している複合的な展開。",
  "抜き": "1マークでは決着せず、道中（バックストレッチ等）で抜く展開。",
};

/** サンプル出走表（イン逃げが軸になりやすい標準的な構成） */
BR.SAMPLE_ENTRY = [
  { no: 1, name: "峰  竜太",   winRate: 7.42, motorRate: 58, avgST: 0.14 },
  { no: 2, name: "毒島 誠",   winRate: 6.85, motorRate: 49, avgST: 0.15 },
  { no: 3, name: "石野 貴之", winRate: 6.61, motorRate: 52, avgST: 0.16 },
  { no: 4, name: "井口 佳典", winRate: 6.20, motorRate: 46, avgST: 0.13 },
  { no: 5, name: "茅原 悠紀", winRate: 5.78, motorRate: 41, avgST: 0.17 },
  { no: 6, name: "西山 貴浩", winRate: 5.40, motorRate: 38, avgST: 0.12 },
];

/** ランダム出走表を生成（テスト・デモ用） */
BR.makeRandomEntry = function () {
  const surnames = ["佐藤","鈴木","高橋","田中","渡辺","伊藤","山本","中村","小林","加藤","吉田","山田","松本","井上","木村"];
  const given = ["太郎","健","誠","翔","大輔","拓也","直樹","和也","隆","勇気","涼","純"];
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const rnd = (min, max, dec = 2) => {
    const v = min + Math.random() * (max - min);
    return Number(v.toFixed(dec));
  };
  return BR.BOATS.map((b) => ({
    no: b.no,
    name: `${pick(surnames)} ${pick(given)}`,
    winRate: rnd(4.5, 7.8, 2),
    motorRate: Math.round(rnd(32, 62, 0)),
    avgST: rnd(0.11, 0.22, 2),
  }));
};

window.BR = BR;

</script>
  <script>
/**
 * engine.js — 展開予想エンジン
 *
 * 出走表（選手の勝率・モーター2連率・平均ST・進入コース）から、
 * 各艇の「強さ」と勝率、1マークでの決まり手、着順予想、推奨買い目を算出する。
 *
 * 競艇の基本特性:
 *  - インコースほど1着率が高い（1号艇が圧倒的有利）。
 *  - スタートタイミング(ST)が速いほど主導権を握りやすく、特に外艇は
 *    速いSTがあると「まくり」が決まりやすい。
 *  - 決まり手は概ね進入コースに対応する（1=逃げ, 2=差し, 4=まくり…）。
 */
const BR = window.BR || {};

/** 値を範囲内に収める */
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

/**
 * 1艇分の基礎指標を計算する。
 * @returns {{base:number, startScore:number, courseRate:number}}
 */
function computeMetrics(entry) {
  const courseRate = BR.COURSE_WIN_RATE[entry.no] || 5; // 進入=艇番として扱う

  // 各要素を 0〜1 付近に正規化
  const skill = clamp(entry.winRate / 7.5, 0, 1.1);       // 全国勝率（7.5でほぼ満点）
  const motor = clamp(entry.motorRate / 60, 0, 1.1);      // モーター2連率
  const course = clamp(courseRate / 55, 0, 1);            // コース有利度
  // STは速い(小さい)ほど良い。0.20を基準に 0.10差で大きく変動。
  const startScore = clamp((0.20 - entry.avgST) / 0.10, -0.5, 1.3);

  // 総合的な「強さ」（コース有利度の比重を最も大きく取る）
  const base =
    0.34 * course +
    0.30 * skill +
    0.21 * motor +
    0.15 * startScore;

  return { base, startScore, courseRate };
}

/**
 * 1マーク到達時点の主導権スコア。
 * 強さに加え、STの速さと外艇の攻撃力（まくり適性）を加味する。
 */
function firstMarkScore(entry, metrics) {
  let s = metrics.base;

  // STアドバンテージ: 速いSTは1マークの主導権に直結
  s += 0.12 * metrics.startScore;

  // 外艇(4〜6)は「速いST × 高い実力」が揃うとまくりで主導権を取れる
  if (entry.no >= 4) {
    const attack = clamp(metrics.startScore, 0, 1.3) * clamp(entry.winRate / 7.5, 0, 1.1);
    s += 0.10 * attack;
  }
  return s;
}

/** 決まり手を判定する */
function decideKimarite(rankingNos, scoreByNo) {
  const leader = rankingNos[0];
  const second = rankingNos[1];
  const gap = scoreByNo[leader] - scoreByNo[second];

  if (leader === 1) return "逃げ";
  if (leader === 2) return "差し";
  if (leader === 3) {
    // 内に差せる隙があれば差し、スピード勝負ならまくり
    return gap > 0.04 ? "まくり" : "差し";
  }
  // 4〜6号艇が先頭 = まくり主体。内艇がすぐ後ろに残れば「まくり差し」決着も。
  if (second <= 3) return "まくり差し";
  return "まくり";
}

/**
 * メインの予想関数。
 * @param {Array} entries 出走表（6艇分）
 * @returns 予想結果オブジェクト
 */
BR.predict = function (entries) {
  // 1. 各艇の指標を算出
  const enriched = entries.map((e) => {
    const m = computeMetrics(e);
    return { ...e, _m: m, base: m.base, firstMark: firstMarkScore(e, m) };
  });

  // 2. 着順予想は 1マーク主導権スコアの降順
  const ranking = [...enriched].sort((a, b) => b.firstMark - a.firstMark);
  const rankingNos = ranking.map((e) => e.no);
  const scoreByNo = {};
  enriched.forEach((e) => (scoreByNo[e.no] = e.firstMark));

  // 3. 勝率: 主導権スコアを温度付きで強調し正規化
  const GAMMA = 3.2; // 大きいほど本命に集中
  const expScores = enriched.map((e) => ({
    no: e.no,
    w: Math.pow(Math.max(e.firstMark, 0.01), GAMMA),
  }));
  const sumW = expScores.reduce((acc, x) => acc + x.w, 0);
  const winProb = {};
  expScores.forEach((x) => (winProb[x.no] = x.w / sumW));

  // 4. 決まり手
  const kimarite = decideKimarite(rankingNos, scoreByNo);
  const leaderNo = rankingNos[0];

  // 5. コメント生成
  const leaderEntry = enriched.find((e) => e.no === leaderNo);
  const comment = buildComment(kimarite, leaderEntry, ranking, winProb);

  // 6. 推奨買い目
  const bets = buildBets(rankingNos, winProb);

  return {
    entries: enriched,
    ranking: rankingNos,
    winProb,
    kimarite,
    leaderNo,
    comment,
    bets,
  };
};

/** 予想コメントを組み立てる */
function buildComment(kimarite, leader, ranking, winProb) {
  const topProb = Math.round(winProb[leader.no] * 100);
  const secondNo = ranking[1].no;
  const info = BR.KIMARITE_INFO[kimarite] || "";
  let lead;
  if (kimarite === "逃げ") {
    lead = `本命は ${leader.no}号艇「${leader.name}」のイン逃げ。`;
  } else if (kimarite === "差し") {
    lead = `${leader.no}号艇「${leader.name}」が内を突く差しで主導権を握る展開。`;
  } else if (kimarite.startsWith("まくり")) {
    lead = `${leader.no}号艇「${leader.name}」のスピードを活かした${kimarite}に注目。`;
  } else {
    lead = `${leader.no}号艇「${leader.name}」が中心。`;
  }
  return `${lead} ${info} 勝率予想は約${topProb}%、相手は ${secondNo}号艇が有力です。`;
}

/**
 * 推奨買い目（3連単・2連単）を組み立てる。
 * 軸＝予想1着、相手＝予想2・3着を中心に、点数を絞った買い目を提示する。
 */
function buildBets(ranking, winProb) {
  const [a, b, c, d] = ranking;
  const pct = (no) => Math.round(winProb[no] * 100);

  const bets = [
    { type: "3連単 本命", combo: `${a}-${b}-${c}`, conf: "◎" },
    { type: "3連単 対抗", combo: `${a}-${c}-${b}`, conf: "○" },
    { type: "3連単 抑え", combo: `${a}-${b}-${d}`, conf: "▲" },
    { type: "2連単 軸流し", combo: `${a}-${b},${a}-${c}`, conf: "◎" },
    { type: "3連複 押さえ", combo: `${a}=${b}=${c}`, conf: "○" },
  ];
  return bets.map((x) => ({ ...x, note: `1着${pct(a)}%` }));
}

window.BR = BR;

</script>
  <script>
/**
 * visualize.js — 展開予想ビジュアライザー
 *
 * スタートから1マーク（第1ターンマーク）までの攻防を Canvas 上でアニメーション表示する。
 * 予想された着順・決まり手に基づき、各艇の航跡（ターンライン）を描画する。
 *  - 予想1着の艇は最も内側を小回りし、先にマークを回る。
 *  - 下位艇ほど外側を大回りし、遅れて回る。
 *  - 「まくり」では外艇が先頭に立つため、その艇が内側ラインで先マイする。
 */
const BR = window.BR || {};

const Visualizer = (function () {
  // 論理キャンバスサイズ
  const W = 920, H = 520;
  // 1マーク（ターンマーク）の位置
  const BUOY = { x: 690, y: 350 };
  const START_X = 120;

  let canvas, ctx, dpr = 1;
  let boats = [];          // 描画用の艇データ（パス・色など）
  let rafId = null;
  let startTime = 0;
  const DURATION = 4200;   // アニメーション時間(ms)
  let onDone = null;

  /** 進入コース(=艇番)ごとのスタートライン上のY座標。内(1号艇)が下、外(6号艇)が上。 */
  function startY(course) {
    return 96 + (6 - course) * 41;
  }

  /** 初期化 */
  function init(canvasEl) {
    canvas = canvasEl;
    ctx = canvas.getContext("2d");
    dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
  }

  /**
   * 予想結果からアニメーション用のパスを構築して再生する。
   * @param {Object} prediction BR.predict() の戻り値
   */
  function render(prediction) {
    const rankIndex = {};
    prediction.ranking.forEach((no, i) => (rankIndex[no] = i));

    boats = prediction.entries.map((e) => {
      const r = rankIndex[e.no];            // 0 = 予想1着
      const meta = BR.BOATS[e.no - 1];
      const y0 = startY(e.no);

      // 着順が上の艇ほどマークを小回り(半径小)し、先に回る
      const R = 30 + r * 19;                 // ターン半径（内回り/外回り）
      const lead = r * 0.045;                // 進行の遅れ（先頭ほど小さい）

      // 3次ベジエ曲線の制御点: スタート → 直進 → マーク手前(小回り) → 旋回出口
      const P0 = { x: START_X, y: y0 };
      const P1 = { x: BUOY.x - 150, y: y0 };
      const P2 = { x: BUOY.x - R, y: BUOY.y + R * 0.25 };
      const P3 = { x: BUOY.x - R * 0.25, y: BUOY.y - R };

      return {
        no: e.no, name: e.name, rank: r,
        color: meta.color, textColor: meta.textColor,
        P0, P1, P2, P3, lead,
        trail: [],
      };
    });

    stop();
    startTime = performance.now();
    onDone = null;
    rafId = requestAnimationFrame(loop);
  }

  /** 再生（同じパスでもう一度） */
  function replay() {
    if (!boats.length) return;
    boats.forEach((b) => (b.trail = []));
    stop();
    startTime = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  function stop() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  /** 3次ベジエ上の点 */
  function bezier(b, t) {
    const mt = 1 - t;
    const a0 = mt * mt * mt, a1 = 3 * mt * mt * t, a2 = 3 * mt * t * t, a3 = t * t * t;
    return {
      x: a0 * b.P0.x + a1 * b.P1.x + a2 * b.P2.x + a3 * b.P3.x,
      y: a0 * b.P0.y + a1 * b.P1.y + a2 * b.P2.y + a3 * b.P3.y,
    };
  }

  /** 3次ベジエの接線（進行方向の角度算出用） */
  function bezierAngle(b, t) {
    const mt = 1 - t;
    const dx =
      3 * mt * mt * (b.P1.x - b.P0.x) +
      6 * mt * t * (b.P2.x - b.P1.x) +
      3 * t * t * (b.P3.x - b.P2.x);
    const dy =
      3 * mt * mt * (b.P1.y - b.P0.y) +
      6 * mt * t * (b.P2.y - b.P1.y) +
      3 * t * t * (b.P3.y - b.P2.y);
    return Math.atan2(dy, dx);
  }

  /** メインループ */
  function loop(now) {
    const elapsed = (now - startTime) / DURATION; // 0..1+
    drawScene(elapsed);
    if (elapsed < 1.05) {
      rafId = requestAnimationFrame(loop);
    } else {
      rafId = null;
      drawScene(1); // 最終フレームを確定描画
      if (onDone) onDone();
    }
  }

  /** 全体の描画 */
  function drawScene(progress) {
    drawCourse();

    // 各艇の現在位置を計算
    const positions = boats.map((b) => {
      const t = Math.max(0, Math.min(1, progress - b.lead));
      const pos = bezier(b, t);
      const ang = bezierAngle(b, t);
      // 航跡を記録
      if (t > 0 && t < 1.0) {
        b.trail.push({ x: pos.x, y: pos.y });
        if (b.trail.length > 60) b.trail.shift();
      }
      return { b, pos, ang, t };
    });

    // 航跡を先に描画
    positions.forEach(({ b }) => drawTrail(b));
    // 艇を描画
    positions.forEach(({ b, pos, ang }) => drawBoat(b, pos, ang));
  }

  /** コース（水面・ライン・ターンマーク）を描画 */
  function drawCourse() {
    // 水面グラデーション
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#2a8bc4");
    g.addColorStop(1, "#0b4d7a");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // うっすらレーンガイド
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 1;
    for (let c = 1; c <= 6; c++) {
      const y = startY(c);
      ctx.beginPath();
      ctx.moveTo(START_X, y);
      ctx.lineTo(BUOY.x - 40, y);
      ctx.stroke();
    }

    // スタートライン
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 8]);
    ctx.beginPath();
    ctx.moveTo(START_X, startY(6) - 30);
    ctx.lineTo(START_X, startY(1) + 30);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("スタート", START_X, startY(6) - 42);

    // ターンマーク（1マーク）: 赤白のブイ
    drawBuoy(BUOY.x, BUOY.y);
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.font = "bold 16px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("1マーク", BUOY.x + 18, BUOY.y - 14);
  }

  /** ターンマークのブイを描画 */
  function drawBuoy(x, y) {
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(x, y + 14, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // 本体（円柱風）
    ctx.fillStyle = "#e63946";
    ctx.beginPath();
    ctx.arc(x, y, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(x, y, 11, Math.PI * 0.15, Math.PI * 0.85);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.3)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, 11, 0, Math.PI * 2);
    ctx.stroke();
  }

  /** 航跡（ウェイク）を描画 */
  function drawTrail(b) {
    if (b.trail.length < 2) return;
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    for (let i = 1; i < b.trail.length; i++) {
      const alpha = (i / b.trail.length) * 0.5;
      ctx.strokeStyle = hexToRgba(b.color, alpha, b.no === 1);
      ctx.beginPath();
      ctx.moveTo(b.trail[i - 1].x, b.trail[i - 1].y);
      ctx.lineTo(b.trail[i].x, b.trail[i].y);
      ctx.stroke();
    }
  }

  /** 1艇を描画（進行方向に回転） */
  function drawBoat(b, pos, ang) {
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(ang);

    // 船体（先のとがった舟形）
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-9, -7);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-9, 7);
    ctx.closePath();
    ctx.fillStyle = b.color;
    ctx.strokeStyle = "rgba(0,0,0,0.55)";
    ctx.lineWidth = 1.5;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // 艇番ラベル（回転させず水平に）
    ctx.beginPath();
    ctx.arc(pos.x, pos.y - 16, 9, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.5)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = b.textColor;
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(b.no), pos.x, pos.y - 16);
    ctx.textBaseline = "alphabetic";
  }

  /** #rrggbb → rgba文字列。1号艇(白)は視認性のため縁取り色を調整 */
  function hexToRgba(hex, alpha, isWhite) {
    const c = hex.replace("#", "");
    const r = parseInt(c.substring(0, 2), 16);
    const g = parseInt(c.substring(2, 4), 16);
    const b = parseInt(c.substring(4, 6), 16);
    if (isWhite) return `rgba(210,225,235,${alpha})`;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  return { init, render, replay, stop };
})();

BR.Visualizer = Visualizer;
window.BR = BR;

</script>
  <script>
/**
 * app.js — UI制御
 * 出走表の生成・入力読み取り、予想実行、結果と可視化の表示を担う。
 */
(function () {
  const BR = window.BR;

  const els = {
    entryBody: document.getElementById("entryBody"),
    sampleBtn: document.getElementById("sampleBtn"),
    randomBtn: document.getElementById("randomBtn"),
    predictBtn: document.getElementById("predictBtn"),
    replayBtn: document.getElementById("replayBtn"),
    canvas: document.getElementById("raceCanvas"),
    vizPlaceholder: document.getElementById("vizPlaceholder"),
    vizComment: document.getElementById("vizComment"),
    kimariteBadge: document.getElementById("kimariteBadge"),
    resultEmpty: document.getElementById("resultEmpty"),
    resultContent: document.getElementById("resultContent"),
    rankingList: document.getElementById("rankingList"),
    betList: document.getElementById("betList"),
  };

  /** 出走表の入力行を生成 */
  function buildTable() {
    els.entryBody.innerHTML = "";
    BR.BOATS.forEach((b) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>
          <span class="boat-badge" style="background:${b.color};color:${b.textColor}">${b.no}</span>
        </td>
        <td><input class="name-input" data-no="${b.no}" data-f="name" type="text" placeholder="選手名"></td>
        <td><input data-no="${b.no}" data-f="winRate" type="number" step="0.01" min="0" max="10" placeholder="0.00"></td>
        <td><input data-no="${b.no}" data-f="motorRate" type="number" step="1" min="0" max="100" placeholder="0"></td>
        <td><input data-no="${b.no}" data-f="avgST" type="number" step="0.01" min="0" max="1" placeholder="0.00"></td>
      `;
      els.entryBody.appendChild(tr);
    });
  }

  /** 出走表に値をセット */
  function fillTable(entries) {
    entries.forEach((e) => {
      setVal(e.no, "name", e.name);
      setVal(e.no, "winRate", e.winRate);
      setVal(e.no, "motorRate", e.motorRate);
      setVal(e.no, "avgST", e.avgST);
    });
  }

  function setVal(no, field, value) {
    const el = els.entryBody.querySelector(`input[data-no="${no}"][data-f="${field}"]`);
    if (el) el.value = value;
  }

  /** 出走表から入力値を読み取り。未入力はコース平均的なデフォルトで補完 */
  function readTable() {
    return BR.BOATS.map((b) => {
      const name = getVal(b.no, "name") || `${b.no}号艇`;
      const winRate = num(getVal(b.no, "winRate"), 5.5);
      const motorRate = num(getVal(b.no, "motorRate"), 45);
      const avgST = num(getVal(b.no, "avgST"), 0.16);
      return { no: b.no, name, winRate, motorRate, avgST };
    });
  }

  function getVal(no, field) {
    const el = els.entryBody.querySelector(`input[data-no="${no}"][data-f="${field}"]`);
    return el ? el.value.trim() : "";
  }
  function num(v, fallback) {
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : fallback;
  }

  /** 予想を実行 */
  function runPrediction() {
    const entries = readTable();
    const result = BR.predict(entries);

    // 可視化
    els.vizPlaceholder.style.display = "none";
    BR.Visualizer.render(result);
    els.replayBtn.disabled = false;

    // 決まり手バッジ
    els.kimariteBadge.textContent = `決まり手: ${result.kimarite}`;
    els.kimariteBadge.classList.remove("badge-hidden");

    // コメント
    els.vizComment.textContent = result.comment;

    // 結果（着順・買い目）
    renderResult(result);
  }

  /** 着順予想と買い目を描画 */
  function renderResult(result) {
    els.resultEmpty.hidden = true;
    els.resultContent.hidden = false;

    // 着順（勝率の降順 = ranking順）
    els.rankingList.innerHTML = "";
    result.ranking.forEach((no, i) => {
      const entry = result.entries.find((e) => e.no === no);
      const meta = BR.BOATS[no - 1];
      const prob = Math.round(result.winProb[no] * 100);
      const li = document.createElement("li");
      li.innerHTML = `
        <span class="rank-pos">${i + 1}着</span>
        <span class="boat-badge" style="background:${meta.color};color:${meta.textColor}">${no}</span>
        <span class="rank-name">${escapeHtml(entry.name)}</span>
        <span class="prob-bar-wrap"><span class="prob-bar" style="width:${prob}%"></span></span>
        <span class="prob-val">${prob}%</span>
      `;
      els.rankingList.appendChild(li);
    });

    // 買い目
    els.betList.innerHTML = "";
    result.bets.forEach((bet) => {
      const div = document.createElement("div");
      div.className = "bet-item";
      div.innerHTML = `
        <span class="bet-type">${bet.type}</span>
        <span class="bet-combo">${bet.combo}</span>
        <span class="bet-conf">${bet.conf}</span>
      `;
      els.betList.appendChild(div);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );
  }

  // ---- イベント登録 ----
  els.sampleBtn.addEventListener("click", () => fillTable(BR.SAMPLE_ENTRY));
  els.randomBtn.addEventListener("click", () => fillTable(BR.makeRandomEntry()));
  els.predictBtn.addEventListener("click", runPrediction);
  els.replayBtn.addEventListener("click", () => BR.Visualizer.replay());

  // ---- 初期化 ----
  buildTable();
  BR.Visualizer.init(els.canvas);
  fillTable(BR.SAMPLE_ENTRY); // 初期表示としてサンプルを投入
})();

</script>
</body>
